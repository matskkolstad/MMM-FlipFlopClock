<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMM-FlipFlopClock Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Inline the module CSS so we can demo without a server -->
    <link rel="stylesheet" href="MMM-FlipFlopClock.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2a3b 100%);
            min-height: 100vh;
            padding: 40px 20px 60px;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            color: #e0e0e0;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-bottom: 40px;
        }

        /* ── Controls panel ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .control-group {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 20px;
        }

        .control-group label {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.55;
            margin-bottom: 10px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            background: transparent;
            color: #ccc;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover  { background: rgba(255,255,255,0.1); color: #fff; }
        button.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.5); }

        /* ── Demo grid ── */
        .demo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        .demo-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 30px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .demo-card-label {
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.45;
        }

        /* ── Live clock ── */
        #main-clock-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <h1>MMM-FlipFlopClock</h1>
    <p class="subtitle">Interactive Demo — MagicMirror² Module</p>

    <!-- ── Controls ── -->
    <div class="controls">
        <div class="control-group">
            <label>Animation</label>
            <div class="btn-row" id="anim-btns">
                <button class="active" data-anim="flip">Flip</button>
                <button data-anim="fade">Fade</button>
                <button data-anim="slide">Slide</button>
                <button data-anim="zoom">Zoom</button>
                <button data-anim="roll">Roll</button>
                <button data-anim="none">None</button>
            </div>
        </div>

        <div class="control-group">
            <label>Theme</label>
            <div class="btn-row" id="theme-btns">
                <button class="active" data-theme="dark">Dark</button>
                <button data-theme="light">Light</button>
                <button data-theme="amber">Amber</button>
                <button data-theme="green">Green</button>
                <button data-theme="blue">Blue</button>
            </div>
        </div>

        <div class="control-group">
            <label>Size</label>
            <div class="btn-row" id="size-btns">
                <button data-size="small">Small</button>
                <button class="active" data-size="medium">Medium</button>
                <button data-size="large">Large</button>
                <button data-size="xlarge">XLarge</button>
            </div>
        </div>

        <div class="control-group">
            <label>Options</label>
            <div class="btn-row">
                <button id="toggle-seconds" class="active">Seconds ✓</button>
                <button id="toggle-date"    class="active">Date ✓</button>
                <button id="toggle-blink"               >Blink ✗</button>
                <button id="toggle-12hr"                >12-hr ✗</button>
                <button id="toggle-vertical"            >Vertical ✗</button>
            </div>
        </div>
    </div>

    <!-- ── Main live clock ── -->
    <div id="main-clock-wrapper">
        <div id="main-clock" class="flip-clock-wrapper medium theme-dark animation-flip orientation-horizontal"></div>
    </div>

    <!-- ── Static showcase: all themes ── -->
    <div class="demo-grid" id="theme-showcase">
        <div class="demo-card">
            <div class="demo-card-label">Dark (default)</div>
            <div id="sc-dark"  class="flip-clock-wrapper medium theme-dark  animation-flip orientation-horizontal"></div>
        </div>
        <div class="demo-card">
            <div class="demo-card-label">Light</div>
            <div id="sc-light" class="flip-clock-wrapper medium theme-light animation-flip orientation-horizontal"></div>
        </div>
        <div class="demo-card">
            <div class="demo-card-label">Amber</div>
            <div id="sc-amber" class="flip-clock-wrapper medium theme-amber animation-flip orientation-horizontal"></div>
        </div>
        <div class="demo-card">
            <div class="demo-card-label">Green</div>
            <div id="sc-green" class="flip-clock-wrapper medium theme-green animation-flip orientation-horizontal"></div>
        </div>
        <div class="demo-card">
            <div class="demo-card-label">Blue</div>
            <div id="sc-blue"  class="flip-clock-wrapper medium theme-blue  animation-flip orientation-horizontal"></div>
        </div>
    </div>

    <script>
    // ── Minimal moment.js shim ──────────────────────────────────────────────
    const moment = (function() {
        const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const MONTHS = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
        const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun',
                              'Jul','Aug','Sep','Oct','Nov','Dec'];
        function pad(n) { return n < 10 ? '0'+n : ''+n; }
        function fmt(d, f) {
            const h24  = d.getHours(), h12mod = h24 % 12, h12 = h12mod === 0 ? 12 : h12mod;
            const map = {
                HH: pad(h24),
                hh: pad(h12),
                mm: pad(d.getMinutes()),
                ss: pad(d.getSeconds()),
                A:  h24 >= 12 ? 'PM' : 'AM',
                a:  h24 >= 12 ? 'pm' : 'am',
                dddd: DAYS[d.getDay()],
                ddd:  DAYS[d.getDay()].slice(0,3),
                MMMM: MONTHS[d.getMonth()],
                MMM:  SHORT_MONTHS[d.getMonth()],
                MM:   pad(d.getMonth()+1),
                M:    ''+(d.getMonth()+1),
                DD:   pad(d.getDate()),
                D:    ''+d.getDate(),
                YYYY: ''+d.getFullYear(),
                YY:   (''+d.getFullYear()).slice(-2),
            };
            return f.replace(/dddd|ddd|MMMM|MMM|MM|M|DD|D|YYYY|YY|HH|hh|mm|ss|A|a/g, m => map[m] || m);
        }
        return function() {
            const d = new Date();
            return { format: f => fmt(d, f) };
        };
    })();

    // ── FlipClock class ─────────────────────────────────────────────────────
    class FlipClock {
        constructor(elementId, config) {
            this.el      = document.getElementById(elementId);
            this.id      = elementId;
            this.cfg     = Object.assign({
                timeFormat:    24,
                showSeconds:   true,
                showDate:      false,
                dateFormat:    "dddd, MMMM D, YYYY",
                animationType: "flip",
                theme:         "dark",
                size:          "medium",
                orientation:   "horizontal",
                blinkSeparator: false,
            }, config);
            this.prev = { hours: null, minutes: null, seconds: null };
            this.first = true;
            this._start();
        }

        _start() {
            this._tick();
            const now = Date.now();
            const delay = 1000 - (now % 1000);
            setTimeout(() => {
                this._tick();
                setInterval(() => this._tick(), 1000);
            }, delay);
        }

        _tick() {
            const t = moment();
            const hours   = this.cfg.timeFormat === 12 ? t.format("hh") : t.format("HH");
            const minutes = t.format("mm");
            const seconds = t.format("ss");

            if (this.first) {
                this._render(t, hours, minutes, seconds);
                this.prev = { hours, minutes, seconds };
                this.first = false;
                return;
            }

            if (hours   !== this.prev.hours)   this._flipPair(hours,   "hours");
            if (minutes !== this.prev.minutes) this._flipPair(minutes, "minutes");
            if (this.cfg.showSeconds && seconds !== this.prev.seconds)
                this._flipPair(seconds, "seconds");

            // Update date text
            const dateEl = this.el.querySelector(".flip-date");
            if (dateEl) dateEl.textContent = t.format(this.cfg.dateFormat);

            // Update AM/PM
            if (this.cfg.timeFormat === 12) {
                const amEl = this.el.querySelector(".flip-ampm");
                if (amEl) amEl.textContent = t.format("A");
            }

            this.prev = { hours, minutes, seconds };
        }

        _render(t, hours, minutes, seconds) {
            this.el.innerHTML = '';
            this.el.className = [
                'flip-clock-wrapper',
                this.cfg.size,
                'theme-' + this.cfg.theme,
                'animation-' + this.cfg.animationType,
                'orientation-' + this.cfg.orientation,
            ].join(' ');

            if (this.cfg.showDate) {
                const d = document.createElement('div');
                d.className = 'flip-date';
                d.textContent = t.format(this.cfg.dateFormat);
                this.el.appendChild(d);
            }

            const tc = document.createElement('div');
            tc.className = 'flip-time-container';

            tc.appendChild(this._pair(hours,   'hours'));
            tc.appendChild(this._sep());
            tc.appendChild(this._pair(minutes, 'minutes'));

            if (this.cfg.showSeconds) {
                tc.appendChild(this._sep());
                tc.appendChild(this._pair(seconds, 'seconds'));
            }

            if (this.cfg.timeFormat === 12) {
                const ap = document.createElement('div');
                ap.className = 'flip-ampm';
                ap.textContent = t.format('A');
                tc.appendChild(ap);
            }

            this.el.appendChild(tc);
        }

        _pair(value, unit) {
            const c = document.createElement('div');
            c.className = 'flip-digit-pair';
            c.appendChild(this._digit(value.charAt(0), unit + '-1'));
            c.appendChild(this._digit(value.charAt(1), unit + '-2'));
            return c;
        }

        _digit(value, id) {
            const d = document.createElement('div');
            d.className = 'flip-digit';
            d.id = this.id + '-' + id;
            d.dataset.value = value;

            const top = document.createElement('div');
            top.className = 'flip-digit-top';
            top.innerHTML = `<span>${value}</span>`;

            const bot = document.createElement('div');
            bot.className = 'flip-digit-bottom';
            bot.innerHTML = `<span>${value}</span>`;

            const ft = document.createElement('div');
            ft.className = 'flip-digit-flip flip-digit-flip-top';
            ft.innerHTML = `<span>${value}</span>`;

            const fb = document.createElement('div');
            fb.className = 'flip-digit-flip flip-digit-flip-bottom';
            fb.innerHTML = `<span>${value}</span>`;

            d.appendChild(top);
            d.appendChild(ft);
            d.appendChild(fb);
            d.appendChild(bot);
            return d;
        }

        _sep() {
            const s = document.createElement('div');
            s.className = 'flip-separator' + (this.cfg.blinkSeparator ? ' blink-separator' : '');
            const d1 = document.createElement('div');
            d1.className = 'flip-separator-dot';
            const d2 = document.createElement('div');
            d2.className = 'flip-separator-dot';
            s.appendChild(d1);
            s.appendChild(d2);
            return s;
        }

        _flipPair(newValue, unit) {
            this._flipDigit(newValue.charAt(0), unit + '-1');
            this._flipDigit(newValue.charAt(1), unit + '-2');
        }

        _flipDigit(newValue, id) {
            const el = document.getElementById(this.id + '-' + id);
            if (!el || el.dataset.value === newValue) return;

            const oldValue  = el.dataset.value;
            const anim      = this.cfg.animationType;
            const top       = el.querySelector('.flip-digit-top span');
            const bot       = el.querySelector('.flip-digit-bottom span');
            const flipTop   = el.querySelector('.flip-digit-flip-top span');
            const flipBot   = el.querySelector('.flip-digit-flip-bottom span');

            if (anim === 'flip') {
                // Correct flip-clock mechanic:
                // flipTop   = OLD digit, folds DOWN (0° → −90°)
                // flipBottom = NEW digit, unfolds DOWN (90° → 0°)
                // Static bottom pre-set to NEW for seamless reveal
                if (flipTop) flipTop.textContent = oldValue;
                if (flipBot) flipBot.textContent = newValue;
                if (top)     top.textContent     = oldValue;
                if (bot)     bot.textContent     = newValue;
            } else {
                if (top)     top.textContent     = newValue;
                if (bot)     bot.textContent     = newValue;
                if (flipTop) flipTop.textContent = newValue;
                if (flipBot) flipBot.textContent = newValue;
            }

            const cls = { flip:'flipping', fade:'fading', slide:'sliding',
                          zoom:'zooming', roll:'rolling' }[anim] || 'changing';
            const dur = { flip:600, fade:400, slide:400, zoom:400, roll:600 }[anim] || 0;

            el.classList.remove('flipping','fading','sliding','zooming','rolling','changing');
            void el.offsetWidth;
            el.classList.add(cls);

            // At midpoint of flip, swap static top to new value (flipTop is now invisible)
            if (anim === 'flip') {
                setTimeout(() => { if (top) top.textContent = newValue; }, 300);
            }

            setTimeout(() => {
                el.classList.remove(cls);
                if (top) top.textContent = newValue;
                if (bot) bot.textContent = newValue;
                el.dataset.value = newValue;
            }, dur);
        }

        // Hot-swap config without full re-render
        setConfig(patch) {
            Object.assign(this.cfg, patch);
            const t = moment();
            const hours   = this.cfg.timeFormat === 12 ? t.format("hh") : t.format("HH");
            const minutes = t.format("mm");
            const seconds = t.format("ss");
            this._render(t, hours, minutes, seconds);
            this.prev = { hours, minutes, seconds };
        }
    }

    // ── Instantiate main interactive clock ──────────────────────────────────
    const mainClock = new FlipClock('main-clock', {
        showDate: true,
        animationType: 'flip',
        theme: 'dark',
        size: 'medium',
        blinkSeparator: false,
    });

    // ── Instantiate showcase (theme row) ────────────────────────────────────
    ['dark','light','amber','green','blue'].forEach(theme => {
        new FlipClock('sc-' + theme, {
            theme,
            showDate:      false,
            showSeconds:   false,
            blinkSeparator: false,
        });
    });

    // ── Control button wiring ────────────────────────────────────────────────
    function activateBtn(groupId, attr, val) {
        document.querySelectorAll('#' + groupId + ' button').forEach(b => {
            b.classList.toggle('active', b.dataset[attr] === val);
        });
    }

    document.querySelectorAll('#anim-btns button').forEach(b => {
        b.addEventListener('click', () => {
            mainClock.setConfig({ animationType: b.dataset.anim });
            activateBtn('anim-btns', 'anim', b.dataset.anim);
        });
    });

    document.querySelectorAll('#theme-btns button').forEach(b => {
        b.addEventListener('click', () => {
            mainClock.setConfig({ theme: b.dataset.theme });
            activateBtn('theme-btns', 'theme', b.dataset.theme);
        });
    });

    document.querySelectorAll('#size-btns button').forEach(b => {
        b.addEventListener('click', () => {
            mainClock.setConfig({ size: b.dataset.size });
            activateBtn('size-btns', 'size', b.dataset.size);
        });
    });

    const toggles = {
        'toggle-seconds':  () => { mainClock.cfg.showSeconds  = !mainClock.cfg.showSeconds;  return mainClock.cfg.showSeconds; },
        'toggle-date':     () => { mainClock.cfg.showDate     = !mainClock.cfg.showDate;      return mainClock.cfg.showDate; },
        'toggle-blink':    () => { mainClock.cfg.blinkSeparator = !mainClock.cfg.blinkSeparator; return mainClock.cfg.blinkSeparator; },
        'toggle-12hr':     () => { mainClock.cfg.timeFormat   = mainClock.cfg.timeFormat === 12 ? 24 : 12; return mainClock.cfg.timeFormat === 12; },
        'toggle-vertical': () => { mainClock.cfg.orientation  = mainClock.cfg.orientation === 'vertical' ? 'horizontal' : 'vertical'; return mainClock.cfg.orientation === 'vertical'; },
    };
    const toggleLabels = {
        'toggle-seconds':  ['Seconds ✗', 'Seconds ✓'],
        'toggle-date':     ['Date ✗',    'Date ✓'],
        'toggle-blink':    ['Blink ✗',   'Blink ✓'],
        'toggle-12hr':     ['12-hr ✗',   '12-hr ✓'],
        'toggle-vertical': ['Vertical ✗','Vertical ✓'],
    };

    Object.keys(toggles).forEach(id => {
        const btn = document.getElementById(id);
        btn.addEventListener('click', () => {
            const on = toggles[id]();
            btn.textContent = toggleLabels[id][on ? 1 : 0];
            btn.classList.toggle('active', on);
            const t = moment();
            const hours   = mainClock.cfg.timeFormat === 12 ? t.format("hh") : t.format("HH");
            const minutes = t.format("mm");
            const seconds = t.format("ss");
            mainClock._render(t, hours, minutes, seconds);
            mainClock.prev = { hours, minutes, seconds };
        });
    });
    </script>
</body>
</html>
